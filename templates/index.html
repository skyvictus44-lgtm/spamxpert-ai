
<!DOCTYPE html>
<html>
<head>
    <title>SMS Spam Detector - IBM Fest Edition</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>📩 SpamXpert</h1>
    <p>Ai powered SMS spam detection system</p>

    <form action="/predict" method="post">
        <textarea name="message" placeholder="Enter your SMS here..."></textarea>
        <button type="submit">Analyze Message</button>
    </form>

    {% if prediction %}
        <div class="result">
            <h2>{{ prediction }}</h2>
            <p>Confidence: {{ confidence }}%</p>
            <img src="/static/accuracy.png" width="300">
        </div>
    {% endif %}
</div>

</body>
</html>
